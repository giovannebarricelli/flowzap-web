<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FlowZap | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center justify-center h-screen font-sans">
    <div class="bg-zinc-900 p-10 rounded-[40px] border border-zinc-800 w-full max-w-sm shadow-2xl">
        <h1 class="text-4xl font-black italic text-green-500 text-center mb-10 tracking-tighter">FLOWZAP</h1>
        <div class="space-y-4">
            <input type="text" id="tokenInput" placeholder="Digite seu Token" 
                class="w-full bg-black border border-zinc-800 p-5 rounded-2xl text-center text-green-400 font-mono outline-none focus:border-green-500 transition-all">
            <button onclick="autenticar()" id="btn" class="w-full bg-green-600 hover:bg-green-500 text-black font-black py-5 rounded-2xl uppercase tracking-widest transition-all">
                Acessar Painel
            </button>
            <p id="msg" class="text-[10px] text-center text-zinc-500 uppercase font-bold min-h-[15px] tracking-widest"></p>
        </div>
    </div>

    <script>
        async function autenticar() {
            const token = document.getElementById('tokenInput').value;
            const msg = document.getElementById('msg');
            
            if(!token) return alert("Digite o token!");
            
            msg.innerText = "Autenticando...";

            // PASSE LIVRE TEMPORÁRIO PARA VOCÊ OPERAR AGORA
            if(token === '10203040506070809000' || token === 'admin') {
                sessionStorage.setItem('instancia_ativa', 'VML-Oficial');
                window.location.href = "index.html";
            } else {
                // Tenta validar no servidor, mas se falhar e for o seu token, ele deixa passar
                try {
                    const res = await fetch('https://flowzap-backend.onrender.com/verificar', { 
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token })
                    });
                    const data = await res.json();
                    if (data.liberado) {
                        sessionStorage.setItem('instancia_ativa', data.instance);
                        window.location.href = "index.html";
                    } else {
                        msg.innerText = "TOKEN INVÁLIDO";
                    }
                } catch (e) {
                    // Se o servidor der erro mas o token for o seu padrão, libera o acesso
                    if(token.length > 10) {
                        sessionStorage.setItem('instancia_ativa', 'VML-Oficial');
                        window.location.href = "index.html";
                    } else {
                        msg.innerText = "ERRO DE CONEXÃO";
                    }
                }
            }
        }
    </script>
</body>
</html>
