<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FlowZap | Autenticação</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-white flex items-center justify-center h-screen p-4">
    <div class="bg-zinc-900 p-10 rounded-3xl border border-zinc-800 w-full max-w-sm shadow-2xl shadow-green-900/10">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black italic text-green-500 tracking-tighter">FLOWZAP</h1>
            <p class="text-zinc-500 text-[10px] uppercase tracking-[0.3em] mt-2 font-bold">Sales Intelligence System</p>
        </div>
        
        <div class="space-y-6">
            <div>
                <label class="block text-[10px] text-zinc-500 mb-2 uppercase font-black tracking-widest text-center">Chave de Acesso Numérica</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-zinc-600">
                        <i class="fas fa-shield-alt"></i>
                    </span>
                    <input type="text" id="tokenInput" placeholder="Ex: 102030..." 
                        class="w-full bg-black border border-zinc-800 p-4 pl-12 rounded-2xl focus:border-green-500 outline-none transition-all text-sm font-mono tracking-[0.2em] text-green-400 text-center">
                </div>
            </div>

            <button onclick="verificarAcesso()" id="btn-login" 
                class="w-full bg-green-600 hover:bg-green-500 text-black font-black py-4 rounded-2xl transition-all uppercase tracking-widest shadow-lg shadow-green-900/20 flex items-center justify-center gap-2">
                <i class="fas fa-unlock"></i> Acessar Painel
            </button>
            
            <p id="mensagem" class="text-[10px] text-center font-mono h-4 italic uppercase tracking-wider"></p>
        </div>
        
        <footer class="mt-12 text-center">
            <p class="text-[9px] text-zinc-700 uppercase font-bold tracking-widest">Powered by Fenix Group & Parrot OS</p>
        </footer>
    </div>
    <script src="auth.js"></script>
</body>
</html>
