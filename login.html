<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FlowZap | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center justify-center h-screen">
    <div class="bg-zinc-900 p-10 rounded-3xl border border-zinc-800 w-full max-w-sm shadow-2xl">
        <h1 class="text-4xl font-black italic text-green-500 text-center mb-10 tracking-tighter">FLOWZAP</h1>
        
        <div class="space-y-4">
            <input type="text" id="tokenInput" placeholder="Chave de Acesso Numérica" 
                class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-center text-green-400 font-mono focus:border-green-500 outline-none">
            
            <button onclick="autenticar()" id="btn" class="w-full bg-green-600 hover:bg-green-500 text-black font-black py-4 rounded-2xl uppercase tracking-widest transition-all">
                Acessar Sistema
            </button>
            
            <p id="msg" class="text-[10px] text-center text-zinc-600 uppercase font-bold min-h-[15px]"></p>
        </div>
    </div>

    <script>
        async function autenticar() {
            const token = document.getElementById('tokenInput').value;
            const msg = document.getElementById('msg');
            const btn = document.getElementById('btn');

            if(!token) return alert("Digite a chave!");

            msg.innerText = "Validando chave segura...";
            btn.disabled = true;

            try {
                // APÓS O DEPLOY, SUBSTITUA A URL ABAIXO PELA URL DO BACKEND NO RENDER
                const URL_BACKEND = "https://flowzap-backend.onrender.com"; 

                const res = await fetch(`${URL_BACKEND}/verificar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });

                const data = await res.json();

                if (data.liberado) {
                    sessionStorage.setItem('logado', 'true');
                    sessionStorage.setItem('instancia_ativa', data.instance);
                    window.location.href = "index.html";
                } else {
                    msg.innerText = "ACESSO NEGADO: CHAVE INVÁLIDA";
                    btn.disabled = false;
                }
            } catch (e) {
                msg.innerText = "ERRO: SERVIDOR OFFLINE";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
