<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FlowZap | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-black text-white p-8">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-zinc-900 pb-6">
            <h1 class="text-3xl font-black italic text-green-500 tracking-tighter">FLOWZAP</h1>
            <div class="text-right">
                <p class="text-[9px] text-zinc-500 uppercase font-black">Instância Ativa</p>
                <p id="inst-display" class="text-green-400 font-mono text-xs font-bold"></p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-2">
                <label class="text-[10px] text-zinc-500 uppercase font-black ml-2">Lista de Contatos</label>
                <textarea id="numeros" rows="12" placeholder="5564999999999" class="w-full bg-zinc-900 border border-zinc-800 p-5 rounded-3xl outline-none focus:border-green-500 font-mono text-sm"></textarea>
            </div>
            <div class="space-y-2">
                <label class="text-[10px] text-zinc-500 uppercase font-black ml-2">Mensagem (Script de Venda)</label>
                <textarea id="texto" rows="12" placeholder="Olá!..." class="w-full bg-zinc-900 border border-zinc-800 p-5 rounded-3xl outline-none focus:border-green-500 text-sm"></textarea>
            </div>
        </div>

        <button onclick="iniciar()" id="btn-envio" class="w-full bg-green-600 hover:bg-green-500 text-black font-black py-6 rounded-3xl mt-8 uppercase tracking-[0.2em] transition-all flex items-center justify-center gap-3">
            <i class="fas fa-rocket"></i> Iniciar Disparos em Massa
        </button>

        <div id="logs" class="mt-10 bg-zinc-900/50 border border-zinc-900 rounded-3xl p-6 h-48 overflow-y-auto font-mono text-[10px] text-zinc-600">
            <p>> Sistema pronto para operação.</p>
        </div>
    </div>

    <script>
        const inst = sessionStorage.getItem('instancia_ativa');
        if(!inst) window.location.href = 'login.html';
        document.getElementById('inst-display').innerText = inst;

        async function iniciar() {
            const numeros = document.getElementById('numeros').value.split('\n').filter(n => n.trim() !== "");
            const texto = document.getElementById('texto').value;
            const btn = document.getElementById('btn-envio');
            const logs = document.getElementById('logs');

            if(numeros.length === 0 || !texto) return alert("Preencha todos os campos!");

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch animate-spin"></i> DISPARANDO...';

            for(let n of numeros) {
                const log = document.createElement('p');
                log.innerText = `> Tentando enviar para ${n.trim()}...`;
                logs.prepend(log);

                try {
                    const res = await fetch(`https://evolution-api-latest-3pb6.onrender.com/message/sendText/${inst}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'apikey': 'vml2026' },
                        body: JSON.stringify({ "number": n.trim(), "text": texto })
                    });
                    
                    if(res.ok) {
                        log.innerText += " SUCESSO!";
                        log.classList.add('text-green-500');
                    } else {
                        log.innerText += " FALHA.";
                        log.classList.add('text-red-500');
                    }
                } catch(e) {
                    log.innerText += " ERRO DE REDE.";
                }

                await new Promise(r => setTimeout(r, 4000)); // Delay Anti-Ban
            }

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-rocket"></i> Iniciar Disparos em Massa';
            alert("Campanha finalizada!");
        }
    </script>
</body>
</html>
