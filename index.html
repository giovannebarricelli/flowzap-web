<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowZap | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans selection:bg-green-500 selection:text-black">

    <div class="max-w-4xl mx-auto p-6">
        <header class="flex justify-between items-center py-8 border-b border-zinc-800 mb-10">
            <h1 class="text-3xl font-black italic tracking-tighter text-green-500">FLOWZAP</h1>
            <div class="text-right">
                <p class="text-xs text-zinc-500 uppercase">Status do Sistema</p>
                <span class="text-xs bg-green-500/10 text-green-400 px-2 py-1 rounded border border-green-500/20">Online</span>
            </div>
        </header>

        <div class="bg-zinc-900 rounded-2xl border border-zinc-800 p-8 shadow-2xl">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                <i class="fa-solid fa-magnifying-glass-chart text-green-500"></i>
                Extração de Leads Inteligente
            </h2>
            
            <div class="space-y-4">
                <input type="text" placeholder="Qual cidade quer minerar?" 
                    class="w-full bg-black border border-zinc-800 p-4 rounded-xl focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition-all">
                
                <input type="text" placeholder="Qual o nicho? (Ex: Dentistas, Petshops)" 
                    class="w-full bg-black border border-zinc-800 p-4 rounded-xl focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none transition-all">
                
                <button class="w-full bg-green-600 hover:bg-green-500 text-black font-black py-5 rounded-xl transition-all uppercase tracking-widest shadow-lg shadow-green-600/10">
                    Iniciar Robô de Vendas
                </button>
            </div>
        </div>

        <div class="mt-10 bg-black rounded-xl p-4 font-mono text-[10px] md:text-xs border border-zinc-800 text-zinc-500 leading-relaxed overflow-hidden">
            <p class="text-green-500">> [SYSTEM]: FlowZap inicializado com sucesso no Parrot OS.</p>
            <p>> [INFO]: Aguardando entrada do operador para conexão com a Evolution API...</p>
        </div>
    </div>

</body>
</html>
