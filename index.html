<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FlowZap | Painel de Disparo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans selection:bg-green-500 selection:text-black">

    <div class="max-w-4xl mx-auto p-6">
        <header class="flex justify-between items-center py-6 border-b border-zinc-800 mb-8">
            <h1 class="text-2xl font-black italic text-green-500">FLOWZAP</h1>
            <div class="flex items-center gap-4 text-right">
                <div>
                    <p class="text-[10px] text-zinc-500 uppercase">Instância Ativa</p>
                    <span id="display-instancia" class="text-xs text-green-400 font-mono">---</span>
                </div>
                <button onclick="logout()" class="text-zinc-600 hover:text-red-500 transition-all">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 space-y-6">
                <div class="bg-zinc-900 rounded-2xl border border-zinc-800 p-6 shadow-2xl">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <i class="fas fa-paper-plane text-green-500"></i> Disparador em Massa
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] text-zinc-500 mb-2 uppercase font-bold">Números (Um por linha com DDD)</label>
                            <textarea id="numeros" rows="5" placeholder="5564999999999" 
                                class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-green-500 outline-none text-sm font-mono"></textarea>
                        </div>
                        
                        <div>
                            <label class="block text-[10px] text-zinc-500 mb-2 uppercase font-bold">Mensagem</label>
                            <textarea id="mensagem_texto" rows="4" placeholder="Olá! Tenho uma oferta para você..." 
                                class="w-full bg-black border border-zinc-800 p-3 rounded-xl focus:border-green-500 outline-none text-sm"></textarea>
                        </div>
                        
                        <button onclick="iniciarDisparo()" id="btn-disparo" class="w-full bg-green-600 hover:bg-green-500 text-black font-black py-4 rounded-xl transition-all uppercase tracking-widest">
                            Iniciar Disparo Individual
                        </button>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-zinc-900 rounded-2xl border border-zinc-800 p-6 h-full">
                    <h3 class="text-xs font-black text-zinc-500 uppercase mb-4 tracking-tighter italic">Log de Atividade</h3>
                    <div id="logs" class="space-y-2 h-[380px] overflow-y-auto font-mono text-[10px]">
                        <p class="text-zinc-600">> Aguardando comando...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="disparo.js"></script>
    <script>
        // Trava de Segurança
        if (sessionStorage.getItem('logado') !== 'true') { window.location.href = "login.html"; }
        document.getElementById('display-instancia').innerText = sessionStorage.getItem('instancia_ativa');
        
        function logout() {
            sessionStorage.clear();
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
